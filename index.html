<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeBuildz AI Analyzer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #f59e0b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('consultation');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState("");
            const [error, setError] = useState("");

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, loading, result, error]);

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) {
                    setFile(selectedFile);
                    setResult("");
                    setError("");
                }
            };

            const runAnalysis = async () => {
                if (!file) return;
                setLoading(true);
                setResult("");
                setError("");

                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        const base64Data = reader.result.split(',')[1];
                        // المفتاح الجديد الذي أرسلته
                        const API_KEY = "AIzaSyDImR8D0ilVbSdb9Y-7k4qAt2N_OdIyl84"; 
                        
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: activeTab === 'consultation' ? "حلل هذه الاستشارة الجزائرية واستخرج أهم النقاط القانونية." : "حلل دفتر الشروط واستخرج الالتزامات التقنية." },
                                        { inline_data: { mime_type: file.type, data: base64Data } }
                                    ]
                                }]
                            })
                        });

                        const data = await response.json();
                        
                        if (data.candidates && data.candidates[0]) {
                            setResult(data.candidates[0].content.parts[0].text);
                        } else if (data.error) {
                            setError(`تنبيه: ${data.error.message}`);
                        } else {
                            setError("حدث خطأ في قراءة رد المحرك الذكي.");
                        }
                    } catch (err) {
                        setError("انقطع الاتصال بالمحرك. تأكد من حجم الملف أو جودة الإنترنت.");
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-3xl mx-auto">
                        <div className="flex gap-2 p-1 bg-slate-200 rounded-xl w-fit mb-8 mx-auto shadow-sm border border-slate-300">
                            <button onClick={() => {setActiveTab('consultation'); setResult(""); setError("");}}
                                className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold transition-all ${activeTab === 'consultation' ? 'bg-[#1e293b] text-white shadow-md' : 'text-slate-600 hover:bg-slate-300'}`}>
                                <i data-lucide="file-text"></i> تدقيق الاستشارة
                            </button>
                            <button onClick={() => {setActiveTab('cahier'); setResult(""); setError("");}}
                                className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold transition-all ${activeTab === 'cahier' ? 'bg-[#f59e0b] text-white shadow-md' : 'text-slate-600 hover:bg-slate-300'}`}>
                                <i data-lucide="shield"></i> تحليل دفتر الشروط
                            </button>
                        </div>

                        <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 p-8">
                            <h2 className="text-2xl font-bold text-center mb-6 text-slate-800">
                                {activeTab === 'consultation' ? 'محلل الاستشارات الذكي' : 'مدقق دفاتر الشروط المتقدم'}
                            </h2>
                            
                            <div className="border-2 border-dashed border-slate-200 rounded-xl p-10 hover:border-orange-400 bg-slate-50 text-center relative mb-6 transition-colors">
                                <input type="file" onChange={handleFileChange} className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*,application/pdf" />
                                <div className="flex flex-col items-center">
                                    <i data-lucide="upload-cloud" className="mb-2 text-slate-400 w-10 h-10"></i>
                                    <p className="font-bold text-slate-700">{file ? file.name : "ارفع الوثيقة (صورة أو PDF)"}</p>
                                    <p className="text-xs text-slate-400 mt-2">نظام HeBuildz يدعم الملفات حتى 4 ميجابايت</p>
                                </div>
                            </div>

                            <button onClick={runAnalysis} disabled={loading || !file}
                                className={`w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-3 transition-all ${loading || !file ? 'bg-slate-300 cursor-not-allowed' : 'bg-[#2c3e50] text-white hover:bg-[#1a252f] shadow-lg active:scale-95'}`}>
                                {loading ? <div className="loader"></div> : <i data-lucide="zap" className="text-yellow-400"></i>}
                                {loading ? "جاري التحليل المعمق..." : "بدء التحليل الاستراتيجي"}
                            </button>

                            {error && (
                                <div className="mt-6 p-4 bg-red-50 border-r-4 border-red-500 text-red-700 rounded shadow-sm">
                                    {error}
                                </div>
                            )}

                            {result && (
                                <div className="mt-8 p-6 bg-orange-50 border-r-4 border-orange-500 rounded-lg text-right animate-in fade-in slide-in-from-top-4 duration-500">
                                    <h3 className="font-bold text-orange-900 mb-3 flex items-center gap-2">
                                        <i data-lucide="check-circle" className="w-5 h-5"></i> تقرير الذكاء الاصطناعي:
                                    </h3>
                                    <div className="text-slate-700 leading-relaxed whitespace-pre-wrap text-sm border-t border-orange-200 pt-4 mt-2">
                                        {result}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
