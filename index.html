<div id="hb-analyzer-container" style="direction: rtl; font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 15px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="btn-1" onclick="switchMode('one')" style="flex: 1; padding: 10px; cursor: pointer; border-radius: 8 baseline; border: none; background: #1e293b; color: white; font-weight: bold;">📄 تدقيق الاستشارة</button>
        <button id="btn-2" onclick="switchMode('two')" style="flex: 1; padding: 10px; cursor: pointer; border-radius: 8px; border: none; background: #f1f5f9; color: #64748b; font-weight: bold;">🛡️ دفتر الشروط</button>
    </div>

    <div style="border: 2px dashed #ccc; padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 20px; background: #fafafa; position: relative;">
        <input type="file" id="fileInput" style="position: absolute; inset: 0; opacity: 0; cursor: pointer;" accept="image/*,application/pdf">
        <div id="fileName" style="color: #666; font-weight: bold;">اضغط لرفع ملف (صورة أو PDF)</div>
    </div>

    <button id="analyzeBtn" onclick="processAnalysis()" style="width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;">بدء التحليل الاستراتيجي ⚡</button>

    <div id="loading" style="display: none; text-align: center; margin-top: 15px; color: #f59e0b; font-weight: bold;">جاري التحليل... يرجى الانتظار</div>
    <div id="errorArea" style="display: none; margin-top: 15px; padding: 10px; background: #fee2e2; color: #b91c1c; border-right: 5px solid red; font-size: 14px;"></div>
    <div id="resultArea" style="display: none; margin-top: 20px; padding: 15px; background: #fffcf5; border-right: 5px solid #f59e0b; border-radius: 8px;">
        <h4 style="margin: 0 0 10px 0; color: #9a3412;">نتائج التحليل:</h4>
        <div id="textContent" style="white-space: pre-wrap; font-size: 14px; line-height: 1.6; color: #334155;"></div>
    </div>
</div>

<script>
    let currentMode = 'one';
    const fileInput = document.getElementById('fileInput');
    const fileNameDiv = document.getElementById('fileName');

    fileInput.addEventListener('change', (e) => {
        if(e.target.files[0]) fileNameDiv.innerText = "✅ " + e.target.files[0].name;
    });

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('btn-1').style.background = (mode === 'one') ? '#1e293b' : '#f1f5f9';
        document.getElementById('btn-1').style.color = (mode === 'one') ? 'white' : '#64748b';
        document.getElementById('btn-2').style.background = (mode === 'two') ? '#f59e0b' : '#f1f5f9';
        document.getElementById('btn-2').style.color = (mode === 'two') ? 'white' : '#64748b';
    }

    async function processAnalysis() {
        const file = fileInput.files[0];
        if(!file) return alert("يرجى اختيار ملف أولاً");

        document.getElementById('analyzeBtn').disabled = true;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('errorArea').style.display = 'none';

        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];
            const API_KEY = "AIzaSyDImR8D0ilVbSdb9Y-7k4qAt2N_OdIyl84";
            const prompt = (currentMode === 'one') ? "حلل هذه الاستشارة واستخرج البيانات" : "حلل دفتر الشروط بالتفصيل";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: base64Data } }] }]
                    })
                });

                const data = await response.json();
                if(data.candidates) {
                    document.getElementById('textContent').innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('resultArea').style.display = 'block';
                } else {
                    throw new Error();
                }
            } catch (err) {
                document.getElementById('errorArea').innerText = "فشل التحليل. تأكد من الإنترنت أو حجم الملف.";
                document.getElementById('errorArea').style.display = 'block';
            } finally {
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        };
        reader.readAsDataURL(file);
    }
</script>
