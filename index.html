<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        .hb-wrapper { font-family: 'Cairo', sans-serif; direction: rtl; max-width: 700px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .loading-ring { border: 3px solid #f3f3f3; border-top: 3px solid #f59e0b; border-radius: 50%; width: 18px; height: 18px; animation: hb-spin 1s linear infinite; display: inline-block; margin-left: 10px; }
        @keyframes hb-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-mode { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-active { background: #1e293b; color: white; }
        .btn-inactive { background: #f1f5f9; color: #64748b; }
        .upload-zone { border: 2px dashed #e2e8f0; padding: 30px; text-align: center; border-radius: 12px; cursor: pointer; margin-bottom: 20px; position: relative; }
        .upload-zone:hover { border-color: #f59e0b; background: #fffcf5; }
        .btn-analyze { w-full; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-analyze:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="hb-root"></div>

    <script type="text/babel">
        const { useState } = React;

        function HeBuildzCore() {
            const [tab, setTab] = useState('one');
            const [myFile, setMyFile] = useState(null);
            const [isRunning, setIsRunning] = useState(false);
            const [report, setReport] = useState("");
            const [err, setErr] = useState("");

            const handleFileSelect = (e) => {
                if (e.target.files[0]) {
                    setMyFile(e.target.files[0]);
                    setReport("");
                    setErr("");
                }
            };

            const triggerAnalysis = async (e) => {
                // منع المتصفح من إعادة تحميل الصفحة (أهم سطر لحل مشكلتك)
                if(e) e.preventDefault(); 
                
                if (!myFile || isRunning) return;
                
                setIsRunning(true);
                setErr("");
                setReport("");

                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        const base64 = reader.result.split(',')[1];
                        const KEY = "AIzaSyDImR8D0ilVbSdb9Y-7k4qAt2N_OdIyl84";
                        
                        const msg = tab === 'one' ? "حلل هذه الاستشارة واستخرج البيانات" : "حلل دفتر الشروط بالتفصيل";

                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: msg }, { inline_data: { mime_type: myFile.type, data: base64 } }] }]
                            })
                        });

                        const json = await res.json();
