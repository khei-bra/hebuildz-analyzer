<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeBuildz AI Analyzer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; margin: 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #f59e0b; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('consultation');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState("");
            const [error, setError] = useState("");

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) {
                    setFile(selectedFile);
                    setResult("");
                    setError("");
                }
            };

            const runAnalysis = async () => {
                if (!file) return;
                setLoading(true);
                setResult("");
                setError("");

                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        const base64Data = reader.result.split(',')[1];
                        const API_KEY = "AIzaSyDImR8D0ilVbSdb9Y-7k4qAt2N_OdIyl84"; 
                        
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: activeTab === 'consultation' ? "حلل هذه الاستشارة واستخرج طبيعة المشروع والوثائق المطلوبة." : "حلل دفتر الشروط واستخرج الالتزامات المالية والتقنية." },
                                        { inline_data: { mime_type: file.type, data: base64Data } }
                                    ]
                                }]
                            })
                        });

                        const data = await response.json();
                        
                        if (data && data.candidates && data.candidates[0] && data.candidates[0].content) {
                            setResult(data.candidates[0].content.parts[0].text);
                        } else {
                            setError("رد غير متوقع من المحرك. تأكد من وضوح الملف أو جرب مفتاح API آخر.");
                        }
                    } catch (err) {
                        setError("فشل الاتصال بالمحرك. تحقق من الإنترنت وحجم الملف.");
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen p-4 flex items-center justify-center">
                    <div className="w-full max-w-2xl">
                        {/* الأزرار العلوية */}
                        <div className="flex gap-4 justify-center mb-8">
                            <button onClick={() => {setActiveTab('consultation'); setResult(""); setError("");}}
                                className={`px-8 py-3 rounded-xl font-bold transition-all shadow-sm ${activeTab === 'consultation' ? 'bg-[#1e293b] text-white' : 'bg-white text-slate-600'}`}>
                                📂 تدقيق الاستشارة
                            </button>
                            <button onClick={() => {setActiveTab('cahier'); setResult(""); setError("");}}
                                className={`px-8 py-3 rounded-xl font-bold transition-all shadow-sm ${activeTab === 'cahier' ? 'bg-[#f59e0b] text-white' : 'bg-white text-slate-600'}`}>
                                🛡️ تحليل دفتر الشروط
                            </button>
                        </div>

                        {/* الكارت الرئيسي */}
                        <div className="bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
                            <h2 className="text-2xl font-bold text-center text-slate-800 mb-8">
                                {activeTab === 'consultation' ? 'محلل الاستشارات الذكي' : 'مدقق دفاتر الشروط المتقدم'}
                            </h2>
                            
                            <div className="border-4 border-dashed border-slate-100 rounded-2xl p-12 bg-slate-50 text-center relative mb-8 group hover:border-orange-200 transition-all">
                                <input type="file" onChange={handleFileChange} className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*,application/pdf" />
                                <div className="text-4xl mb-4">📤</div>
                                <p className="font-bold text-slate-700">{file ? file.name :
