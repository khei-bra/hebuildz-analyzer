<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeBuildz AI Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        :root { --hb-dark: #1e293b; --hb-orange: #f59e0b; --hb-text: #334155; }
        body { font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; background: transparent; color: var(--hb-text); }
        .main-card { background: white; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 25px; border: 1px solid #e2e8f0; }
        .tabs { display: flex; background: #f1f5f9; padding: 4px; border-radius: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-family: 'Cairo'; color: #64748b; background: transparent; transition: 0.3s; }
        .tab.active { background: var(--hb-dark); color: white; }
        .upload-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 35px 15px; text-align: center; margin-bottom: 20px; cursor: pointer; background: #fafafa; transition: 0.3s; }
        .upload-zone:hover { border-color: var(--hb-orange); background: #fffcf5; }
        .btn-analyze { width: 100%; padding: 15px; background: var(--hb-orange); color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-analyze:disabled { background: #cbd5e1; cursor: not-allowed; }
        #res-box { display: none; margin-top: 20px; padding: 15px; background: #f8fafc; border-right: 4px solid var(--hb-dark); border-radius: 8px; }
        .loader { width: 18px; height: 18px; border: 3px solid #ffffff3d; border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-card">
    <div class="tabs">
        <button id="t1" class="tab active" onclick="setMode('consultation')">تدقيق الاستشارة</button>
        <button id="t2" class="tab" onclick="setMode('cahier')">تحليل دفتر الشروط</button>
    </div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" style="display:none" accept="image/*,application/pdf">
        <div style="font-size: 30px; margin-bottom: 10px;">📄</div>
        <div id="statusText" style="font-weight: 600;">اسحب ملف المناقصة هنا</div>
        <div style="font-size: 11px; color: #94a3b8; margin-top: 5px;">نظام HeBuildz يدعم حتى 4 ميجابايت</div>
    </div>

    <button id="execBtn" class="btn-analyze" onclick="runHeBuildzAI()">
        <span class="loader" id="loadingIcon"></span>
        <span id="btnText">بدء التحليل الذكي</span>
    </button>

    <div id="res-box">
        <strong style="color: var(--hb-dark); display: block; margin-bottom: 8px;">نتائج التحليل من Gemini API:</strong>
        <div id="ai-output" style="white-space: pre-wrap; font-size: 13px; line-height: 1.6;"></div>
    </div>
</div>

<script>
    let currentMode = 'consultation';
    const fIn = document.getElementById('fileInput');
    
    fIn.onchange = () => { if(fIn.files[0]) document.getElementById('statusText').innerText = "✅ " + fIn.files[0].name; };

    function setMode(m) {
        currentMode = m;
        document.getElementById('t1').className = m === 'consultation' ? 'tab active' : 'tab';
        document.getElementById('t2').className = m === 'cahier' ? 'tab active' : 'tab';
    }

    async function runHeBuildzAI() {
        const file = fIn.files[0];
        if(!file) return alert("يرجى رفع ملف أولاً");

        const btn = document.getElementById('execBtn');
        const ld = document.getElementById('loadingIcon');
        const txt = document.getElementById('btnText');
        
        btn.disabled = true;
        ld.style.display = 'inline-block';
        txt.innerText = "جاري المعالجة المعمقة...";

        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            // تم وضع مفتاحك الجديد هنا
            const API_KEY = "AIzaSyBHlb39mDzSBvwc4u_uCfTUbYKfL1Bb2TQ"; 
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: currentMode === 'consultation' ? "حلل هذه الاستشارة الجزائرية واستخرج النقاط القانونية والوثائق المطلوبة" : "حلل دفتر الشروط هذا واستخرج الالتزامات المالية والتقنية" },
                            { inline_data: { mime_type: file.type, data: base64 } }
                        ]}]
                    })
                });

                const data = await response.json();
                if(data.candidates && data.candidates[0]) {
                    document.getElementById('ai-output').innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('res-box').style.display = 'block';
                } else {
                    alert("المحرك لم يتمكن من تحليل هذا النوع من الملفات. تأكد من وضوح الصورة.");
                }
            } catch (err) {
                alert("خطأ في الاتصال بالخادم. يرجى المحاولة لاحقاً.");
            } finally {
                btn.disabled = false;
                ld.style.display = 'none';
                txt.innerText = "بدء التحليل الذكي";
            }
        };
        reader.readAsDataURL(file); // تم إصلاح الدالة هنا
    }
</script>
</body>
</html>
