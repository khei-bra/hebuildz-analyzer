<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeBuildz AI Analyzer - Core</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: transparent; }
        .loader { border-top-color: #f59e0b; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('consultation');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState("");

            useEffect(() => { lucide.createIcons(); }, [activeTab, loading, result]);

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) setFile(selectedFile);
            };

            const runAnalysis = async () => {
                if (!file) return alert("الرجاء رفع ملف أولاً");
                setLoading(true);
                setResult("");

                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    try {
                        const API_KEY = "AIzaSyBHlb39mDzSBvwc4u_uCfTUbYKfL1Bb2TQ"; 
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: activeTab === 'consultation' ? "حلل إعلان هذه المناقصة الجزائرية واستخرج: طبيعة المشروع، مدة الإنجاز، والوثائق المطلوبة." : "حلل جدول الأسعار الوحدوية (BPU) لهذا المشروع وحذرني من أي أسعار غير منطقية." },
                                        { inline_data: { mime_type: file.type, data: base64Data } }
                                    ]
                                }]
                            })
                        });
                        const data = await response.json();
                        setResult(data.candidates[0].content.parts[0].text);
                    } catch (error) {
                        setResult("خطأ في الاتصال. تأكد من أن الملف بصيغة PDF أو صورة واضحة.");
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen p-4" dir="rtl">
                    <div className="max-w-4xl mx-auto">
                        <div className="flex gap-2 p-1 bg-slate-200 rounded-xl w-fit mb-8 mx-auto shadow-sm">
                            <button onClick={() => {setActiveTab('consultation'); setResult(""); setFile(null);}}
                                className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold transition-all ${activeTab === 'consultation' ? 'bg-[#1e293b] text-white shadow-md' : 'text-slate-600'}`}>
                                <i data-lucide="file-check"></i> تدقيق إعلان الاستشارة
                            </button>
                            <button onClick={() => {setActiveTab('cahier'); setResult(""); setFile(null);}}
                                className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold transition-all ${activeTab === 'cahier' ? 'bg-[#f59e0b] text-white shadow-md' : 'text-slate-600'}`}>
                                <i data-lucide="shield-check"></i> تحليل دفتر الشروط
                            </button>
                        </div>

                        <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
                            <h2 className="text-2xl font-bold text-slate-800 mb-2 text-center">
                                {activeTab === 'consultation' ? 'محلل إعلانات الاستشارة الذكي' : 'مدقق دفاتر الشروط المتقدم'}
                            </h2>
                            <p className="text-slate-500 mb-8 text-center text-sm">مدعوم بتقنيات Gemini 1.5 Pro للتحليل الاستراتيجي</p>
                            
                            <div className="border-2 border-dashed border-slate-200 rounded-xl p-8 hover:border-orange-400 cursor-pointer bg-slate-50 text-center relative">
                                <input type="file" onChange={handleFileChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                                <div className="flex flex-col items-center">
                                    <i data-lucide="upload" className="text-slate-400 mb-2"></i>
                                    <p className="text-slate-600 font-bold">{file ? `تم اختيار: ${file.name}` : "اضغط هنا لرفع الوثيقة"}</p>
                                </div>
                            </div>

                            <button onClick={runAnalysis} disabled={loading}
                                className="w-full mt-6 bg-[#2c3e50] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#1a252f] flex justify-center items-center gap-3">
                                {loading ? <div className="loader rounded-full border-4 border-gray-200 h-6 w-6"></div> : <i data-lucide="zap" className="w-5 h-5 text-yellow-400"></i>}
                                {loading ? "جاري المعالجة..." : "بدء التحليل الآن"}
                            </button>

                            {result && (
                                <div className="mt-8 p-6 bg-slate-50 border-r-4 border-blue-900 rounded-lg text-right">
                                    <h3 className="font-bold text-blue-900 mb-3 flex items-center gap-2 text-lg">
                                        <i data-lucide="info"></i> نتائج التحليل الذكي:
                                    </h3>
                                    <div className="text-slate-700 leading-relaxed whitespace-pre-wrap">{result}</div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
