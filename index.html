<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        /* إضافة خط Cairo وتحسين التنسيق ليتناسب مع ووردبريس */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        .hebuildz-container { font-family: 'Cairo', sans-serif; direction: rtl; max-width: 800px; margin: auto; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #f59e0b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .active-tab { bg-color: #1e293b; color: white; }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="hebuildz-analyzer-root"></div>

    <script type="text/babel">
        const { useState } = React;

        function HeBuildzApp() {
            const [mode, setMode] = useState('consultation');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState("");
            const [errorMessage, setErrorMessage] = useState("");

            const handleFile = (e) => {
                const f = e.target.files[0];
                if (f) {
                    setFile(f);
                    setResult("");
                    setErrorMessage("");
                }
            };

            const startAnalysis = async () => {
                if (!file) return;
                setLoading(true);
                setErrorMessage("");
                setResult("");

                try {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        try {
                            const base64Data = reader.result.split(',')[1];
                            const API_KEY = "AIzaSyDImR8D0ilVbSdb9Y-7k4qAt2N_OdIyl84";
                            
                            const prompt = mode === 'consultation' 
                                ? "حلل هذه الاستشارة الجزائرية واستخرج أهم النقاط القانونية والوثائق المطلوبة." 
                                : "حلل دفتر الشروط هذا واستخرج الالتزامات التقنية والمالية والأسعار غير المنطقية.";

                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    contents: [{
                                        parts: [
                                            { text: prompt },
                                            { inline_data: { mime_type: file.type, data: base64Data } }
                                        ]
                                    }]
                                })
                            });

                            const data = await response.json();
                            
                            if (data.candidates && data.candidates[0]) {
                                setResult(data.candidates[0].content.parts[0].text);
                            } else {
                                throw new Error("فشل المحرك في تحليل الملف.");
                            }
                        } catch (err) {
                            setErrorMessage("حدث خطأ أثناء معالجة الطلب. يرجى المحاولة مرة أخرى.");
                        } finally {
                            setLoading(false);
                        }
                    };
                    reader.readAsDataURL(file);
                } catch (e) {
                    setErrorMessage("خطأ في قراءة الملف.");
                    setLoading(false);
                }
            };

            return (
                <div className="hebuildz-container p-4 bg-white rounded-xl shadow-lg border border-slate-100">
                    {/* التبويبات */}
                    <div className="flex gap-2 justify-center mb-6">
                        <button onClick={() => setMode('consultation')} 
                            className={`tab-btn ${mode === 'consultation' ? 'bg-[#1e293b] text-white' : 'bg-slate-100 text-slate-600'}`}>
                            📄 تدقيق الاستشارة
                        </button>
                        <button onClick={() => setMode('cahier')} 
                            className={`tab-btn ${mode === 'cahier' ? 'bg-[#f59e0b] text-white' : 'bg-slate-100 text-slate-600'}`}>
                            🛡️ تحليل دفتر الشروط
                        </button>
                    </div>

                    <h2 className="text-xl font-bold text-center mb-4 text-slate-800">
                        {mode === 'consultation' ? 'محلل الاستشارات الذكي' : 'مدقق دفاتر الشروط المتقدم'}
                    </h2>

                    {/* منطقة الرفع */}
                    <div className="border-2 border-dashed border-slate-200 rounded-xl p-8 bg-slate-50 text-center relative mb-6">
                        <input type="file" onChange={handleFile} className="absolute inset-0 opacity-0 cursor-pointer" accept="image/*,application/pdf" />
                        <div className="text-slate-500 font-bold">
                            {file ? `✅ تم اختيار: ${file.name}` : "اضغط هنا لرفع الملف (صورة أو PDF)"}
                        </div>
                    </div>

                    <button onClick={startAnalysis} disabled={loading || !file}
                        className={`w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-3 transition-all ${loading || !file ? 'bg-slate-300' : 'bg-[#2c3e50] text-white hover:bg-black'}`}>
                        {loading && <div className="loading-spinner"></div>}
                        {loading ? "جاري التحليل..." : "بدء التحليل الاستراتيجي ⚡"}
                    </button>

                    {errorMessage && <div className="mt-4 p-3 bg-red-50 text-red-600 border-r-4 border-red-500 text-sm font-bold">{errorMessage}</div>}

                    {result && (
                        <div className="mt-6 p-5 bg-orange-50 border-r-4 border-orange-500 rounded-lg">
                            <h4 className="font-bold text-orange-900 mb-2">التقرير التحليلي:</h4>
                            <div className="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm">{result}</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('hebuildz-analyzer
