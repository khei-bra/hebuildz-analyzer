<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeBuildz MVP</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; border-top: 5px solid #FF5722; }
        .logo { font-size: 2.5rem; font-weight: bold; color: #2C3E50; margin-bottom: 0.5rem; }
        .logo span { color: #FF5722; }
        .status { color: #27ae60; font-weight: bold; margin-bottom: 1.5rem; display: block; }
        .upload-box { border: 2px dashed #bdc3c7; padding: 2rem; border-radius: 15px; margin-bottom: 1.5rem; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: #FF5722; background: #fff5f2; }
        .btn { background: #2C3E50; color: white; border: none; padding: 0.8rem 2rem; border-radius: 10px; font-size: 1.1rem; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #1a252f; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">He<span>Buildz</span></div>
        <span class="status">● المحرك الذكي متصل</span>
        <h3>محلل الصفقات العمومية (MVP)</h3>
        <p>ارفع صورة إعلان المناقصة أو جدول الأسعار (BPU)</p>
        <div class="upload-box">
            <span>📁 اضغط لرفع الملفات</span>
        </div>
        <button class="btn">بدء التحليل الاستراتيجي</button>
    </div>
</body>
</html>
