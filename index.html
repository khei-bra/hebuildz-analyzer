<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeBuildz AI Analyzer</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-card { background: white; width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e0e0e0; }
        .header { background: #2C3E50; color: white; padding: 20px; text-align: center; }
        .header h2 span { color: #FF5722; }
        .content { padding: 30px; text-align: center; }
        .drop-zone { border: 2px dashed #FF5722; padding: 40px; border-radius: 10px; color: #7f8c8d; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { background: #fff5f2; }
        .btn-analyze { background: #FF5722; color: white; border: none; padding: 15px 30px; border-radius: 8px; width: 100%; font-size: 18px; cursor: pointer; font-weight: bold; }
        .status-bar { background: #ecf0f1; padding: 10px; font-size: 12px; color: #7f8c8d; text-align: center; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="header">
            <h2>He<span>Buildz</span> AI</h2>
        </div>
        <div class="content">
            <h3>محلل الصفقات العمومية</h3>
            <p>ارفع ملف المناقصة أو جدول الأسعار للتحليل</p>
            <div class="drop-zone" onclick="alert('جاري تفعيل خاصية الرفع...')">
                <span>📁 اضغط هنا لرفع الملفات (PDF/JPG)</span>
            </div>
            <button class="btn-analyze">بدء تحليل الأهلية والأسعار</button>
        </div>
        <div class="status-bar">
            v1.0 MVP | متصل بمحرك Gemini 1.5 Pro
        </div>
    </div>
</body>
</html>
