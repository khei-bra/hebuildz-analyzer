<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeBuildz AI Analyzer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #f59e0b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('consultation');
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState("");

            // تفعيل الأيقونات
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, loading, result]);

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) setFile(selectedFile);
            };

            const runAnalysis = async () => {
                if (!file) {
                    alert("الرجاء رفع ملف أولاً");
                    return;
                }
                
                setLoading(true);
                setResult("");

                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        const base64Data = reader.result.split(',')[1];
                        const API_KEY = "AIzaSyBHlb39mDzSBvwc4u_uCfTUbYKfL1Bb2TQ"; 
                        
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: activeTab === 'consultation' ? "حلل إعلان هذه المناقصة الجزائرية واستخرج: طبيعة المشروع، مدة الإنجاز، والوثائق المطلوبة." : "حلل جدول الأسعار الوحدوية (BPU) لهذا المشروع وحذرني من أي أسعار غير منطقية." },
                                        { inline_data: { mime_type: file.type, data: base64Data } }
                                    ]
                                }]
                            })
                        });

                        const data = await response.json();
                        if (data.candidates && data.candidates[0]) {
                            setResult(data.candidates[0].content.parts[0].text);
                        } else {
                            setResult("تعذر الحصول على تحليل. تأكد من وضوح الملف.");
                        }
                    } catch (error) {
                        setResult("خطأ في الاتصال بالمحرك الذكي. حاول مجدداً.");
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        {/* نظام التبويبات */}
                        <div className="flex gap-2 p-1 bg-slate-200 rounded-xl w-fit mb-8 mx-auto shadow-sm">
                            <button 
                                onClick={() => {setActiveTab('consultation'); setResult(""); setFile(null);}}
                                className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold transition-all ${activeTab === 'consultation' ? 'bg-[#1e293b] text-white shadow-md' : 'text-slate-600 hover:bg-slate-300'}`}
                            >
                                <i data-lucide="file-text" className="w-5 h-5"></i>
                                تدقيق الاستشارة
                            </button>
                            <button 
                                onClick={() => {setActiveTab('cahier'); setResult(""); setFile(null);}}
                                className={`flex items-center gap-2 px-6 py-3 rounded-lg font-bold transition-all ${activeTab === 'cahier' ? 'bg-[#f59e0b] text-white shadow-md' : 'text-slate-600 hover:bg-slate-300'}`}
                            >
                                <i data-lucide="shield" className="w-5 h-5"></i>
                                تحليل دفتر الشروط
                            </button>
                        </div>

                        {/* البطاقة الرئيسية */}
                        <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 md:p-10">
                            <h2 className="text-2xl font-bold text-slate-800 mb-2 text-center">
                                {activeTab === 'consultation' ? 'محلل الاستشارات الذكي' : 'مدقق
