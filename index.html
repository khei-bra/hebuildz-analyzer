<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeBuildz MVP - AI Analyzer</title>
    <style>
      body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
      .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
      .logo { font-size: 2em; font-weight: bold; color: #2C3E50; margin-bottom: 10px; }
      .logo span { color: #FF5722; }
      .upload-area { border: 2px dashed #FF5722; padding: 30px; border-radius: 10px; margin: 20px 0; cursor: pointer; }
      .btn { background: #2C3E50; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 1em; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">He<span>Buildz</span></div>
      <h3>محلل المناقصات الذكي</h3>
      <p>ارفع دفتر الشروط أو جدول الأسعار للحصول على تحليل فوري</p>
      <div class="upload-area">
        <p>اسحب الملفات هنا أو اضغط للرفع</p>
      </div>
      <button class="btn">تحليل العرض المالي</button>
    </div>
  </body>
</html>
