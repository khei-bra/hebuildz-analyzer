<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeBuildz Analyzer</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 600px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #eee; }
        .app-header { background: #2c3e50; color: white; padding: 25px; text-align: center; }
        .app-header h1 { margin: 0; font-size: 24px; }
        .app-header h1 span { color: #ff5722; }
        .content { padding: 40px; text-align: center; }
        .upload-area { border: 3px dashed #ff5722; padding: 50px 20px; border-radius: 15px; background: #fff9f7; cursor: pointer; transition: 0.3s; margin-bottom: 25px; }
        .upload-area:hover { background: #fff0eb; border-color: #e64a19; }
        .upload-icon { font-size: 50px; margin-bottom: 15px; display: block; }
        .btn-analyze { background: #ff5722; color: white; border: none; padding: 18px 40px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-analyze:hover { background: #e64a19; transform: translateY(-2px); }
        .footer-info { background: #f8f9fa; padding: 15px; font-size: 13px; color: #7f8c8d; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>He<span>Buildz</span> AI Analyzer</h1>
        </div>
        <div class="content">
            <span class="upload-icon">📄</span>
            <h3>محلل العروض والصفقات العمومية</h3>
            <p style="color: #666;">ارفع ملف دفتر الشروط أو جدول الأسعار بصيغة (PDF/JPG)</p>
            <div class="upload-area" onclick="document.getElementById('file-upload').click()">
                <p id="file-name">اسحب الملف هنا أو انقر لاختياره</p>
                <input type="file" id="file-upload" style="display: none;" onchange="updateFileName()">
            </div>
            <button class="btn-analyze" onclick="startAnalysis()">بدء التحليل الذكي</button>
        </div>
        <div class="footer-info">
            المنصة تدعم تحليل المواد القانونية والتقدير المالي وفق المرسوم 15-247
        </div>
    </div>

    <script>
        function updateFileName() {
            const input = document.getElementById('file-upload');
            const nameDisplay = document.getElementById('file-name');
            if (input.files.length > 0) {
                nameDisplay.innerText = "تم اختيار: " + input.files[0].name;
                nameDisplay.style.color = "#27ae60";
                nameDisplay.style.fontWeight = "bold";
            }
        }
        function startAnalysis() {
            alert("جاري الاتصال بمحرك HeBuildz AI... يرجى الانتظار");
        }
    </script>
</body>
</html>
